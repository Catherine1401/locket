<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locket Add Friend Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            color: #1c1e21;
            margin-top: 0;
        }

        p {
            color: #606770;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            background-color: #FFB901;
            color: black;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .input-group {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Locket Test</h1>
        <p>Để test mở App bằng deep link, hãy nhập Share Code của tài khoản mục tiêu vào ô bên dưới:</p>

        <div class="input-group">
            <input type="text" id="shareCode" placeholder="Nhập Share Code..." value="">
            <button onclick="generateLink()">Tạo Link</button>
        </div>

        <div id="result" style="display: none; margin-top: 20px;">
            <p>Bấm vào nút dưới đây để mờ App:</p>
            <a id="appLink" href="#" class="btn">Mở Locket</a>
        </div>
    </div>

    <script>
        function generateLink() {
            const code = document.getElementById('shareCode').value.trim();
            if (!code) {
                alert('Vui lòng nhập Share Code');
                return;
            }
            const link = document.getElementById('appLink');
            link.href = 'locket://app/add-friend/' + code;

            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>

</html>
